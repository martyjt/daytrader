# Production docker-compose for the Daytrader Linux deployment box.
#
# Usage on marty@192.168.18.222 (after `python scripts/deploy_remote.py`
# uploads this file + .env into ~/daytrader/):
#   cd ~/daytrader && docker compose up -d
#
# CI publishes ghcr.io/martyjt/daytrader:main on every merge to main.
# Watchtower (running from the cashflow stack) polls every 5 min and
# recreates the app container when the digest changes. Only services
# with the watchtower label are watched — Postgres stays pinned to 16.
#
# For local development with redis + mlflow + a build-from-source app,
# use `docker compose -f docker-compose.dev.yml up`.
services:
  app:
    # :main tracks the default branch — Actions republishes on every
    # merge. Pin to :sha-<short> to roll back.
    image: ghcr.io/martyjt/daytrader:main
    container_name: daytrader-app
    restart: unless-stopped
    # Host port 8083 — 8080=freightmanager, 8081=as-quoting, 8082=cashflow.
    # Cloudflared resolves us by service name on the `edge` network.
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://daytrader:${POSTGRES_PASSWORD}@db:5432/daytrader"
    volumes:
      - ./data:/app/data
      - ./plugins-uploads:/app/plugins/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - edge
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16-alpine
    container_name: daytrader-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: daytrader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: daytrader
    volumes:
      - daytrader_pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daytrader -d daytrader"]
      interval: 10s
      timeout: 5s
      retries: 6
    # Postgres is internal-only — no host port published. The app talks
    # to it over the docker network as `db:5432`.
    networks:
      - default
    # Watchtower must NOT auto-bump postgres major versions; the pinned
    # 16-alpine tag + the absent watchtower label keep it untouched.

  backup:
    image: postgres:16-alpine
    container_name: daytrader-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: "14"
    volumes:
      - ./backups:/backups
    networks:
      - default
    # Daily at 02:00 container-local. ash supports an inline loop with
    # `sleep` — keeps us out of cron territory.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[backup] daily pg_dump scheduler started";
        while :; do
          now_h=$$(date +%H);
          if [ "$$now_h" = "02" ]; then
            stamp=$$(date +%Y%m%d-%H%M);
            file="/backups/daytrader-$$stamp.sql.gz";
            echo "[backup] writing $$file";
            pg_dump -h db -U daytrader -d daytrader | gzip > "$$file";
            find /backups -name 'daytrader-*.sql.gz' -mtime +$${BACKUP_RETENTION_DAYS:-14} -delete;
            sleep 3600;
          fi;
          sleep 300;
        done

networks:
  default:
  # Created by the sibling cloudflared compose stack on this host.
  edge:
    external: true
    name: edge

volumes:
  daytrader_pgdata:
