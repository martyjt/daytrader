name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    # Strategy matrix splits the suite into parallel SQLite + Postgres
    # legs. Both must pass for `build-and-push` to fire. Branch
    # protection requires both check names so a regression in either
    # backend blocks merge.
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            test_database_url: ""
          - backend: postgres
            test_database_url: postgresql+asyncpg://daytrader:daytrader@localhost:5432/daytrader

    name: test (${{ matrix.backend }})
    runs-on: ubuntu-latest

    services:
      # Service container is cheap to leave on for the SQLite leg too;
      # the leg just doesn't connect to it. Avoids per-leg conditional
      # service blocks which GH Actions doesn't support cleanly.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daytrader
          POSTGRES_PASSWORD: daytrader
          POSTGRES_DB: daytrader
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U daytrader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Postgres client tools
        if: matrix.backend == 'postgres'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run pytest
        env:
          PYTHONUNBUFFERED: "1"
          TEST_DATABASE_URL: ${{ matrix.test_database_url }}
        run: pytest -q

      - name: Verify alembic upgrades against Postgres
        if: matrix.backend == 'postgres'
        env:
          DATABASE_URL: postgresql+asyncpg://daytrader:daytrader@localhost:5432/daytrader
        run: |
          alembic upgrade head
          alembic current

      - name: Backup/restore drill (pg_dump → fresh DB → smoke test)
        if: matrix.backend == 'postgres'
        env:
          PGPASSWORD: daytrader
          DATABASE_URL: postgresql+asyncpg://daytrader:daytrader@localhost:5432/daytrader_restore
        run: |
          # Source DB is the one alembic just upgraded — dump it, drop
          # the destination, recreate it, restore, and re-run alembic
          # current to prove the schema came across intact.
          pg_dump -h localhost -U daytrader -d daytrader -f /tmp/daytrader.sql
          psql -h localhost -U daytrader -d postgres -c 'DROP DATABASE IF EXISTS daytrader_restore;'
          psql -h localhost -U daytrader -d postgres -c 'CREATE DATABASE daytrader_restore;'
          psql -h localhost -U daytrader -d daytrader_restore -f /tmp/daytrader.sql
          alembic current

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # :main is what Watchtower polls. :latest is also published
          # on default-branch builds. :sha-<short> + :v* tags exist for
          # rollback / pinning.
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Compute build timestamp
        id: stamp
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake commit + build time into the image so the running
          # container can show which version is live.
          build-args: |
            APP_VERSION=${{ github.sha }}
            APP_BUILT_AT=${{ steps.stamp.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
