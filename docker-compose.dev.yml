services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: daytrader-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daytrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daytrader}
      POSTGRES_DB: ${POSTGRES_DB:-daytrader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daytrader}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daytrader-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: daytrader-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "${MLFLOW_HOST_PORT:-5000}:5000"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daytrader-app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./plugins:/app/plugins
      - feature_cache:/app/data/features
    command: python -m daytrader

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  feature_cache:
